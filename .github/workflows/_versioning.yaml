on:
  workflow_call:
    inputs:
      gitversion_file:
        required: false
        type: string
        default: ".github/gitversion/GitVersion.yml"
    outputs:
      semver:
        description: "The calculated semantic version from GitVersion"
        value: ${{ jobs.version.outputs.semver }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '5.x'
          
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0
        with:
          useConfigFile: true
          configFilePath: ${{ inputs.gitversion_file }}

      - id: version
        run: echo "semver=${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_OUTPUT
