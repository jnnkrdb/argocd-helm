name: Create Tag

on:
  push:
    branches: 
      - 'master'
      - 'main'
    paths-ignore:
      - '*.md'
      - 'Makefile'
      - '.testing/**'

jobs:
  version:
    uses: ./.github/workflows/_versioning.yaml
    with:
      gitversion_file: ".github/gitversion/GitVersion.yml"
  create-tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create Tag
        run: |
          git tag ${{ needs.version.outputs.semver }}
          git push origin ${{ needs.version.outputs.semver }}